name: Release

on:
  push:
  workflow_dispatch:

env:
  DEFAULT_VARIANT: "extended_"
  DEFAULT_OS: "linux"
  DEFAULT_ARCH: "amd64"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-and-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Repo Preparer
        id: preparer
        run: |
          JSON_OUT=$(python scripts/prepare-repo.py -c config.yaml --clean --verbose --json-output)
          FILES=$(echo "$JSON_OUT" | jq -r 'join(" ")')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.preparer.outputs.files != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest ${{ steps.preparer.outputs.files }} --title "Latest Custom Builds" --notes "Automated build from config.yaml"
